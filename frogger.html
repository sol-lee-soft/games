<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Frog Hop - Infinite Edition</title>
    <style>
        body {
            background-color: #0d0f12;
            font-family: 'Courier New', Courier, monospace;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        #game-container {
            background: #15181f;
            border: 4px solid #33363f;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.2);
        }
        .dashboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 440px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .exit-btn {
            background: #2a1f2d;
            border: 1px solid #ff00ff;
            color: #ff00ff;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .exit-btn:hover { background: #ff00ff; color: #000000; }
        .stats-panel { display: flex; gap: 20px; }
        #level-indicator { color: #ff00ff; }
        #score-indicator { color: #00ff66; }
        canvas {
            background: #111;
            border: 2px solid #444;
            display: block;
        }
        .controls-tip {
            text-align: center;
            color: #666e7d;
            font-size: 0.8rem;
            margin-top: 10px;
            letter-spacing: 1px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="dashboard">
        <a href="index.html" class="exit-btn">◀ MENU</a>
        <div class="stats-panel">
            <div id="level-indicator">STAGE: 1</div>
            <div id="score-indicator">SCORE: 0</div>
        </div>
    </div>
    
    <canvas id="gameCanvas" width="440" height="450"></canvas>
    
    <div class="controls-tip">
        ARROW KEYS TO HOP UP, DOWN, LEFT, RIGHT<br>
        <span style="color: #a44ac4;">[ CLICK MENU TO EXIT ]</span>
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const levelDisplay = document.getElementById("level-indicator");
    const scoreDisplay = document.getElementById("score-indicator");

    let currentLevel = 1;
    let score = 0;
    let gameLoop;
    let gameActive = false;

    const rowHeight = 40;
    let frog = { x: 200, y: 400, size: 28 }; 
    let lanes = [];

    window.addEventListener("keydown", e => {
        if (["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Enter"].includes(e.code)) {
            e.preventDefault();
        }

        if (!gameActive && e.code === "Enter") {
            resetEntireGame();
            return;
        }

        if (gameActive) {
            if (e.code === "ArrowUp" && frog.y > 0) frog.y -= rowHeight;
            if (e.code === "ArrowDown" && frog.y < 400) frog.y += rowHeight;
            if (e.code === "ArrowLeft" && frog.x > 0) frog.x -= rowHeight;
            if (e.code === "ArrowRight" && frog.x < canvas.width - rowHeight) frog.x += rowHeight;
        }
    });

    function initLevel(lvl) {
        currentLevel = lvl;
        levelDisplay.innerText = "STAGE: " + currentLevel;
        frog.x = 200;
        frog.y = 400;

        let speedMultiplier = 0.8 + (lvl * 0.25);
        
        lanes = [
            { y: 320, speed: 1.4 * speedMultiplier, dir: 1,  sprite: "🚗", vehicles: [40, 200, 360] },
            { y: 240, speed: -1.8 * speedMultiplier, dir: -1, sprite: "🚚", vehicles: [100, 280] },
            { y: 160, speed: 1.2 * speedMultiplier, dir: 1,  sprite: "🚌", vehicles: [0, 180, 340] },
            { y: 80,  speed: -2.5 * speedMultiplier, dir: -1, sprite: "🏎️", vehicles: [150, 350] }
        ];

        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        gameActive = true;
    }

    function resetEntireGame() {
        score = 0;
        scoreDisplay.innerText = "SCORE: " + score;
        initLevel(1);
        clearInterval(gameLoop);
        gameLoop = setInterval(update, 1000 / 60);
    }

    function update() {
        if (!gameActive) return;

        lanes.forEach(lane => {
            for (let i = 0; i < lane.vehicles.length; i++) {
                lane.vehicles[i] += lane.speed;

                if (lane.dir === 1 && lane.vehicles[i] > canvas.width + 40) {
                    lane.vehicles[i] = -40;
                } else if (lane.dir === -1 && lane.vehicles[i] < -40) {
                    lane.vehicles[i] = canvas.width + 40;
                }

                let vx = lane.vehicles[i];
                let vy = lane.y;

                if (frog.x + 4 < vx + 32 && 
                    frog.x + frog.size - 4 > vx &&
                    frog.y + 4 < vy + rowHeight && 
                    frog.y + frog.size - 4 > vy) {
                    
                    triggerGameOver();
                    return;
                }
            }
        });

        if (frog.y <= 40) {
            score += 100 * currentLevel;
            scoreDisplay.innerText = "SCORE: " + score;
            currentLevel++;
            initLevel(currentLevel);
            return; 
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#1b382b";
        ctx.fillRect(0, 0, canvas.width, 40);
        ctx.font = "20px Arial";
        ctx.fillText("🟩 🟩 🟩 🟩 🟩 🟩 🟩 🟩 🟩 🟩 🟩", canvas.width / 2, 20);

        ctx.fillStyle = "#22252c";
        ctx.fillRect(0, 400, canvas.width, 50);

        ctx.strokeStyle = "#444a56";
        ctx.lineWidth = 2;
        ctx.setLineDash([15, 15]);
        for (let j = 120; j <= 360; j += 80) {
            ctx.beginPath();
            ctx.moveTo(0, j);
            ctx.lineTo(canvas.width, j);
            ctx.stroke();
        }
        ctx.setLineDash([]);

        ctx.font = "26px Arial";
        lanes.forEach(lane => {
            lane.vehicles.forEach(vx => {
                ctx.fillText(lane.sprite, vx + 16, lane.y + 20);
            });
        });

        ctx.font = "24px Arial";
        ctx.fillText("🐸", frog.x + 14, frog.y + 20);
    }

    function triggerGameOver() {
        gameActive = false;
        clearInterval(gameLoop);
        
        ctx.fillStyle = "rgba(0, 0, 0, 0.9)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.font = "28px 'Courier New'";
        ctx.fillStyle = "#ff0000";
        ctx.fillText("FROG FLATTENED", canvas.width / 2, canvas.height / 2 - 20);
        
        ctx.font = "16px 'Courier New'";
        ctx.fillStyle = "#ffffff";
        ctx.fillText("FINAL SCORE: " + score, canvas.width / 2, canvas.height / 2 + 15);
        
        ctx.font = "13px 'Courier New'";
        ctx.fillStyle = "#00ff66";
        ctx.fillText("PRESS [ENTER] TO SPAWN NEW FROG", canvas.width / 2, canvas.height / 2 + 50);
    }

    resetEntireGame();
</script>

</body>
</html>
